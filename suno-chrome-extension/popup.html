<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Creaibox Suno Connector</title>
  <style>
    :root {
      --bg: #04060c;
      --card-bg: #0c111f;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --primary: #10b981;
      --primary-hover: #059669;
      --primary-glow: rgba(16, 185, 129, 0.15);
      --border: #1e293b;
      --glow-emerald: rgba(16, 185, 129, 0.35);
    }

    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      user-select: none;
      box-sizing: border-box;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Premium Logo Header Section */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(30, 41, 59, 0.5);
      padding-bottom: 14px;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Embedded high-end SVG Logo Icon */
    .logo-icon {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--primary);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--primary));
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #ffffff;
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 1.5px;
      margin-top: -1px;
    }

    .badge {
      font-size: 9px;
      font-weight: 800;
      padding: 3px 8px;
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(6, 182, 212, 0.1));
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.25);
      letter-spacing: 0.5px;
    }

    /* Glassmorphic Info Card */
    .status-card {
      background: linear-gradient(145deg, #0b0f19, #0d1326);
      border: 1px solid rgba(30, 41, 59, 0.8);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-label {
      color: var(--text-muted);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    .status-value {
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #f8fafc;
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      display: inline-block;
    }

    /* Premium Action Button */
    .btn {
      width: 100%;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #020306;
      font-weight: 800;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
      border-top: 1px solid rgba(30, 41, 59, 0.4);
      padding-top: 10px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Logo Header with Embedded SVG -->
    <div class="header">
      <div class="logo-group">
        <svg class="logo-icon" viewBox="0 0 24 24">
          <!-- Premium Sound Wave & Core Box Design Symbol -->
          <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
          <path d="M2 17l10 5 10-5"></path>
          <path d="M2 12l10 5 10-5"></path>
        </svg>
        <div class="logo-text">
          <span class="brand-name">CreAibox</span>
          <span class="brand-sub">CONNECTOR</span>
        </div>
      </div>
      <div class="badge">MV3 PRO</div>
    </div>

    <!-- Status Card -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">
          🟢 연동 커넥터 상태
        </span>
        <span class="status-value" id="connector-status">
          <span class="status-indicator"></span> 실시간 활성
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">
          👤 Suno 세션 계정
        </span>
        <span class="status-value" id="suno-account">nameamusic</span>
      </div>
      <div class="status-row">
        <span class="status-label">
          ⚡ 동기화 대기 메타
        </span>
        <span class="status-value" id="pending-prefill">없음</span>
      </div>
    </div>

    <!-- Sync Action Button -->
    <button class="btn" id="btn-sync-now">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
      </svg>
      <span>지금 강제 동기화</span>
    </button>

    <div class="footer">
      Suno.com 탭의 생성곡 오디오 및 메타데이터를<br>CreAibox 라이브러리로 자동 동기화 중입니다.
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
